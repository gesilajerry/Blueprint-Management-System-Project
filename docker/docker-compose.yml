version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: blueprint-postgres
    environment:
      POSTGRES_DB: blueprint_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: blueprint-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/blueprint_db
      SECRET_KEY: your-secret-key-change-in-production
      FILE_STORAGE_PATH: /data/drawings
    volumes:
      - file_storage:/data/drawings
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: blueprint-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Nginx (可选，用于生产环境反向代理)
  nginx:
    image: nginx:alpine
    container_name: blueprint-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
    driver: local
  file_storage:
    driver: local
